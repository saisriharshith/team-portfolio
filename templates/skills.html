<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Team Skills</title>

    <!-- BOX ICONS -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="stylesheet.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #081b29, #112e42);
            color: white;
            min-height: 100vh;
            padding: 80px 10%;
        }

        .skills-section {
            width: 100%;
        }

        .section-title {
            text-align: center;
            font-size: 55px;
            margin-bottom: 60px;
            font-weight: 700;
        }

        .section-title span {
            color: #0ef;
        }

        .skills-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 25px rgba(0, 238, 255, 0.12);
        }

        .skill-box {
            margin-bottom: 35px;
        }

        .skill-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 600;
        }

        .skill-name i {
            font-size: 24px;
            color: #0ef;
        }

        .skill-percent {
            font-size: 16px;
            color: #d6d6d6;
        }

        .skill-bar {
            width: 100%;
            height: 14px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            overflow: hidden;
            position: relative;
        }

        .skill-progress {
            height: 100%;
            border-radius: 50px;
            position: relative;
            animation: load 2s ease;
        }

        .cpp {
            width: 72%;
            background: linear-gradient(to right, #a855f7, #ec4899);
        }

        .python {
            width: 68%;
            background: linear-gradient(to right, #06b6d4, #3b82f6);
        }

        .java {
            width: 60%;
            background: linear-gradient(to right, #f97316, #facc15);
        }

        .web {
            width: 75%;
            background: linear-gradient(to right, #22c55e, #14b8a6);
        }

        .dsa {
            width: 58%;
            background: linear-gradient(to right, #fb7185, #c084fc);
        }

        .git {
            width: 65%;
            background: linear-gradient(to right, #38bdf8, #0ea5e9);
        }

        .sql {
            width: 52%;
            background: linear-gradient(to right, #f59e0b, #ef4444);
        }

        .aiml {
            width: 45%;
            background: linear-gradient(to right, #8b5cf6, #6366f1);
        }

        .uiux {
            width: 48%;
            background: linear-gradient(to right, #14b8a6, #06b6d4);
        }

        .problem {
            width: 70%;
            background: linear-gradient(to right, #22c55e, #84cc16);
        }

        @keyframes load {
            from {
                width: 0;
            }
        }

        @media(max-width:768px) {

            body {
                padding: 60px 6%;
            }

            .section-title {
                font-size: 40px;
            }

            .skills-container {
                padding: 25px;
            }

            .skill-name {
                font-size: 17px;
            }

            .skill-percent {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <section class="skills-section">

        <h1 class="section-title">Our <span>Skills</span></h1>

        <div class="skills-container">

            <!-- C++ -->
            <div class="skill-box">
                <div class="skill-info">
                    <div class="skill-name">
                        <i class='bx bxl-c-plus-plus'></i>
                        C / C++
                    </div>
                    <div class="skill-percent">5 Members • 72%</div>
                </div>

                <div class="skill-bar">
                    <div class="skill-progress cpp"></div>
                </div>
            </div>

            <!-- Python -->
            <div class="skill-box">
                <div class="skill-info">
                    <div class="skill-name">
                        <i class='bx bxl-python'></i>
                        Python
                    </div>
                    <div class="skill-percent">4 Members • 68%</div>
                </div>

                <div class="skill-bar">
                    <div class="skill-progress python"></div>
                </div>
            </div>

            <!-- Java -->
            <div class="skill-box">
                <div class="skill-info">
                    <div class="skill-name">
                        <i class='bx bxl-java'></i>
                        Java
                    </div>
                    <div class="skill-percent">3 Members • 60%</div>
                </div>

                <div class="skill-bar">
                    <div class="skill-progress java"></div>
                </div>
            </div>

            <!-- Web Dev -->
            <div class="skill-box">
                <div class="skill-info">
                    <div class="skill-name">
                        <i class='bx bx-code-alt'></i>
                        HTML • CSS • JavaScript
                    </div>
                    <div class="skill-percent">5 Members • 75%</div>
                </div>

                <div class="skill-bar">
                    <div class="skill-progress web"></div>
                </div>
            </div>

            

            <!-- Git -->
            <div class="skill-box">
                <div class="skill-info">
                    <div class="skill-name">
                        <i class='bx bxl-github'></i>
                        Git & GitHub
                    </div>
                    <div class="skill-percent">5 Members • 65%</div>
                </div>

                <div class="skill-bar">
                    <div class="skill-progress git"></div>
                </div>
            </div>

            <!-- SQL -->
            <div class="skill-box">
                <div class="skill-info">
                    <div class="skill-name">
                        <i class='bx bx-data'></i>
                        SQL / Database
                    </div>
                    <div class="skill-percent">3 Members • 52%</div>
                </div>

                <div class="skill-bar">
                    <div class="skill-progress sql"></div>
                </div>
            </div>

            <!-- AI ML -->
            <div class="skill-box">
                <div class="skill-info">
                    <div class="skill-name">
                        <i class='bx bx-bot'></i>
                        AI / ML Basics
                    </div>
                    <div class="skill-percent">3 Members • 45%</div>
                </div>

                <div class="skill-bar">
                    <div class="skill-progress aiml"></div>
                </div>
            </div>

            <!-- UI UX -->
            <div class="skill-box">
                <div class="skill-info">
                    <div class="skill-name">
                        <i class='bx bx-palette'></i>
                        UI / UX Design
                    </div>
                    <div class="skill-percent">2 Members • 48%</div>
                </div>

                <div class="skill-bar">
                    <div class="skill-progress uiux"></div>
                </div>
            </div>

            <!-- Problem Solving -->
            <div class="skill-box">
                <div class="skill-info">
                    <div class="skill-name">
                        <i class='bx bx-bulb'></i>
                        Problem Solving
                    </div>
                    <div class="skill-percent">5 Members • 70%</div>
                </div>

                <div class="skill-bar">
                    <div class="skill-progress problem"></div>
                </div>
            </div>

        </div>
<a href="project.html" class="btn-box">
        Learn
    </a>
    </section>

</body>

</html>
